      - name: generate midnight-bloom profile
        uses: johnlarkin1/github-profile-3d-contrib@main
        env:
          GITHUB_TOKEN: ${{ secrets.GHA_PROFILE_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          MAX_REPOS: 150
          SETTING_JSON: midnight-bloom-settings.json
          EXCLUDED_LANGUAGES: HTML,SCSS
          MAX_LANGUAGES: 6
          LANGUAGE_COLORS: TypeScript:#3178C6,Python:#FFD43B,Rust:#CE422B,JavaScript:#BC8CFF,Swift:#FF6723,Shell:#56D364,Java:#ED8B00,Kotlin:#7F52FF,Perl:#39457E,Ruby:#CC342D,C:#A8B9CC,Jupyter Notebook:#F37626

      - name: Commit and push all profiles
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add profile-3d-contrib/
          git diff --staged --quiet || git commit -m "generate all 3d profiles"
          git push
