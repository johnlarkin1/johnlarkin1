name: generate all 3d profiles

on:
  schedule:
    # midnight est is 0500 utc
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: generate default profile
        uses: johnlarkin1/github-profile-3d-contrib@main
        env:
          GITHUB_TOKEN: ${{ secrets.GHA_PROFILE_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          MAX_REPOS: 150
          SETTING_JSON: default-profile-settings.json
          EXCLUDED_LANGUAGES: HTML,SCSS
          MAX_LANGUAGES: 6
          LANGUAGE_COLORS: TypeScript:#3178C6,Python:#FFD43B,Rust:#CE422B,JavaScript:#BC8CFF,Swift:#FF6723,Shell:#56D364,Java:#ED8B00,Kotlin:#7F52FF,Perl:#39457E,Ruby:#CC342D,C:#A8B9CC,Jupyter Notebook:#F37626

      - name: generate obsidian-aurora profile
        uses: johnlarkin1/github-profile-3d-contrib@main
        env:
          GITHUB_TOKEN: ${{ secrets.GHA_PROFILE_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          MAX_REPOS: 150
          SETTING_JSON: obsidian-aurora-settings.json
          EXCLUDED_LANGUAGES: HTML,SCSS
          MAX_LANGUAGES: 6
          LANGUAGE_COLORS: TypeScript:#3178C6,Python:#FFD43B,Rust:#CE422B,JavaScript:#BC8CFF,Swift:#FF6723,Shell:#56D364,Java:#ED8B00,Kotlin:#7F52FF,Perl:#39457E,Ruby:#CC342D,C:#A8B9CC,Jupyter Notebook:#F37626

      - name: generate burnt-copper profile
        uses: johnlarkin1/github-profile-3d-contrib@main
        env:
          GITHUB_TOKEN: ${{ secrets.GHA_PROFILE_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
          MAX_REPOS: 150
          SETTING_JSON: burnt-copper-settings.json
          EXCLUDED_LANGUAGES: HTML,SCSS
          MAX_LANGUAGES: 6
          LANGUAGE_COLORS: TypeScript:#3178C6,Python:#FFD43B,Rust:#CE422B,JavaScript:#BC8CFF,Swift:#FF6723,Shell:#56D364,Java:#ED8B00,Kotlin:#7F52FF,Perl:#39457E,Ruby:#CC342D,C:#A8B9CC,Jupyter Notebook:#F37626

      - name: generate polar-dawn profile
        uses: johnlarkin1/github-profile-3d-contrib@main
